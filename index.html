<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <title>Frontend Mentor | Newsletter sign-up form with success message</title>

</head>
<body>

  <!-- Sign-up form start -->

  <main class="main-container">
    <section class="image">
      <picture>
        <source media="(min-width: 1440px)" srcset="./assets/images/illustration-sign-up-desktop.svg">
        <source media="(min-width: 768px)" srcset="./assets/images/illustration-sign-up-tablet.svg">
        <img src="./assets/images/illustration-sign-up-mobile.svg" alt="Newsletter Sign Up Image">
      </picture>
    </section>
    <section class="form-container">
      <h1>Stay updated!</h1>

      <p>Join 60,000+ product managers receiving monthly updates on:</p>

      <ul>
        <li>Product discovery and building what matters</li>
        <li>Measuring to ensure updates are a success</li>
        <li>And much more!</li>
      </ul>

      <form action="thank_you.html" method="post" id="form" novalidate>
        <div>
          <label for="email">Email address</label>
          <span class="email-required hidden">Valid email required</span>
        </div>
        <input type="email" name="email" id="email" placeholder="email@company.com">
        <button id="submit-btn" type="submit" disabled>Subscribe to monthly newsletter</button>
      </form>

      <!-- Sign-up form end -->
    </section>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Simeon Markov</a>.
  </footer>

<script src="./script.js"></script>
</body>
</html>
