<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="thank_you.css">

    <title>Frontend Mentor | Newsletter sign-up form with success message</title>

</head>
<body>
<!-- Success message start -->

<main class="thank-you-container">
    <img class="success-icon" src="assets/images/icon-success.svg" alt="Success Icon">
    <div class="thx-message">
        <h1 class="thx-heading">Thanks for subscribing!</h1>
        <p></p>
    </div>
    <button id="dismiss-btn" type="button">Dismiss message</button>
</main>

<!-- Success message end -->
<script src="thank_you.js"></script>
</body>
</html>
